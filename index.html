<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" type="text/css" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="container">
        <h1>Task Tracker
        </h1>
        <p> Stay on top of your task</p>
        <p> New task</p>

        <div>

            <input class="input-text" type="text" placeholder="task one">
            <button class="input-button">Add</button>
        </div>

        <div>
            <button class="input-all"> All</button>
            <button class="input-active"> Active</button>
            <button class="input-completed"> Completed</button>
        </div>

       

        <div class="clear-container">
            <div class="clear-text">

                <p> 1 total</p>
                <p> 1 remaining</p>
            </div>

            <div>

                <button class="input-clear">Clear Completed</button>

            </div>
        </div>
    </div>

</body>

</html>
